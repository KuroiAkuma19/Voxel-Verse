<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Voxel-Verse/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelVerse</title>

    <style>
      /* --- 1. FONTS & RESET --- */
      @font-face {
        font-family: "Minecraft";
        src: url("https://fonts.cdnfonts.com/s/18345/MinecraftRegular-Bmg3.woff")
          format("woff");
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Minecraft", "Courier New", monospace;
        /* SAFARI FIX: Added -webkit prefix */
        -webkit-user-select: none;
        user-select: none;
      }

      /* --- 2. MINECRAFT BUTTON STYLES --- */
      .mc-button {
        position: relative;
        width: 400px;
        padding: 15px 0;
        margin-bottom: 10px;
        font-family: "Minecraft", monospace;
        font-size: 20px;
        color: #ddd;
        text-shadow: 2px 2px 0px #000;
        cursor: pointer;
        background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzjwqJAQGwQBJgQWQAAjgwEA628QA02a6g8AAAAASUVORK5CYII=")
          repeat;
        background-color: #666;
        image-rendering: pixelated;
        border: 2px solid #000;
        box-shadow: inset 2px 2px 0px #aaa, inset -2px -2px 0px #222;
      }

      .mc-button:hover {
        background-color: #777;
        color: #ffffa0;
        box-shadow: inset 2px 2px 0px #ccc, inset -2px -2px 0px #333;
      }

      .mc-button:active {
        background-color: #444;
        box-shadow: inset 2px 2px 0px #222, inset -2px -2px 0px #888;
        transform: translateY(2px);
      }

      /* --- 3. TITLE SCREEN --- */
      #title-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        /* SAFARI FIX: Added -webkit-backdrop-filter */
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }

      .logo-container {
        margin-bottom: 50px;
        position: relative;
      }

      .game-title {
        font-size: 72px;
        color: #c6c6c6;
        margin: 0;
        letter-spacing: 2px;
        text-shadow: 0px 4px #6f6f6f, 0px 6px #3f3f3f, 0px 8px #202020,
          4px 8px 10px rgba(0, 0, 0, 0.5);
      }

      .splash-text {
        position: absolute;
        bottom: -15px;
        right: -50px;
        font-size: 20px;
        color: #ffff55;
        transform: rotate(-20deg);
        text-shadow: 2px 2px 0px #3f3f00;
        animation: pulse 0.4s infinite alternate ease-in-out;
      }

      @keyframes pulse {
        from {
          transform: rotate(-20deg) scale(1);
        }
        to {
          transform: rotate(-20deg) scale(1.1);
        }
      }

      .footer-text {
        position: absolute;
        bottom: 5px;
        left: 5px;
        color: #fff;
        font-size: 14px;
        text-shadow: 1px 1px 0 #000;
      }

      /* --- 4. GAME HUD --- */
      #game-ui {
        display: none;
      }

      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        background: linear-gradient(#fff, #fff), linear-gradient(#fff, #fff);
        background-position: center;
        background-size: 16px 2px, 2px 16px;
        background-repeat: no-repeat;
        mix-blend-mode: difference;
        z-index: 100;
      }

      #toolbar-container {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background-color: transparent;
        padding: 5px;
      }

      #toolbar {
        display: flex;
        gap: 0px; 
      }

      .toolbar-icon {
        width: 40px;
        height: 40px;
        border: 2px solid #555;
        background: rgba(0, 0, 0, 0.3);
        image-rendering: pixelated;
        box-sizing: border-box;
      }

      .toolbar-icon.selected {
        border: 3px solid #fff;
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
        z-index: 10;
        position: relative;
      }

      #controls-hint {
        position: absolute;
        top: 5px;
        right: 5px;
        color: #ddd;
        font-size: 12px;
        text-shadow: 1px 1px 0 #000;
      }

      .lil-gui.root {
        z-index: 2000 !important;
      }

      #inventory-screen {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="/Voxel-Verse/assets/index-BnxfsufA.js"></script>
    <link rel="stylesheet" crossorigin href="/Voxel-Verse/assets/index-BGPmQizi.css">
  </head>
  <body>
    <div id="app"></div>

    <div id="title-screen">
      <div class="logo-container">
        <h1 class="game-title">VOXELVERSE</h1>
        <div class="splash-text">Creative Update!</div>
      </div>
      <button class="mc-button" id="btn-play">Singleplayer</button>
      <button class="mc-button" id="btn-quit">Quit Game</button>
      <div class="footer-text">VoxelVerse Client v1.3</div>
    </div>

    <div id="game-ui">
      <div id="crosshair"></div>
      <div id="controls-hint">
        Press <b>P</b> for Menu | <b>E</b> for Inventory
      </div>

      <div id="toolbar-container">
        <div id="toolbar">
          <img class="toolbar-icon selected" id="toolbar-0" src="./textures/pickaxe.png" />
          <img class="toolbar-icon" id="toolbar-1" src="./textures/grass.png" />
          <img class="toolbar-icon" id="toolbar-2" src="./textures/dirt.png" />
          <img class="toolbar-icon" id="toolbar-3" src="./textures/stone.png" />
          <img class="toolbar-icon" id="toolbar-4" src="./textures/coal_ore.png" />
          <img class="toolbar-icon" id="toolbar-5" src="./textures/iron_ore.png" />
          <img class="toolbar-icon" id="toolbar-6" src="./textures/tree_top.png" />
          <img class="toolbar-icon" id="toolbar-7" src="./textures/cherry_leaves.png" />
          <img class="toolbar-icon" id="toolbar-8" src="./textures/sand.png" />
        </div>
      </div>

      <div id="info">
        <div id="player-position"></div>
      </div>
    </div>

    <div id="inventory-screen">
      <div class="inventory-window"></div>
    </div>

    <div id="status"></div>


  </body>
</html>
